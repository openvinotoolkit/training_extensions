defaults:
  - default

_target_: otx.core.model.module.instance_segmentation.OTXInstanceSegLitModule

optimizer:
  _target_: torch.optim.SGD
  _partial_: true
  lr: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.1
  patience: 10

otx_model:
  _target_: otx.core.model.entity.instance_segmentation.MMDetInstanceSegCompatibleModel
  config: ???

# compile model for faster training with pytorch 2.0
torch_compile: false

export_config:
  export_format: OPENVINO
  precision: FP32
  resize_mode: standard
  pad_value: 0
  swap_rgb: false
  input_height: 224
  input_width: 224
  mean:
    - 0
    - 0
    - 0
  std:
    - 1
    - 1
    - 1
  mmdeploy_config: null
  mm_model_config: null
  test_pipeline: null
