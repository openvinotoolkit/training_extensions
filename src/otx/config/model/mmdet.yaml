  precision: FP32
  resize_mode: standard
  pad_value: 0
  swap_rgb: false
  input_height: 224
  input_width: 224
  mean:
    - 0
    - 0
    - 0
  std:
    - 1
    - 1
    - 1
  mmdeploy_config: null
  mm_model_config: null
  test_pipeline: null
